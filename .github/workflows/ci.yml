name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - run: swift build -v
      - run: swift test -v

  test-linux:
    runs-on: ubuntu-latest
    container:
      image: swift:5.10
    steps:
      - uses: actions/checkout@v4
      - run: swift --version
      - run: swift build
      - run: swift test

# Least-privilege: read-only test/CI runs. GITHUB_TOKEN gets no write to
# anything. The publish/release flows (where they exist) carry their own
# scoped permissions per-workflow.
permissions:
  contents: read
